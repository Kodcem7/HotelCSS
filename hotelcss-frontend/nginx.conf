server {
    listen 80;
    server_name _;

    # Allow image uploads (default nginx limit is 1MB)
    client_max_body_size 25M;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Reverse proxy to the API container (same Docker network) ----
    # Everything is served from this single origin, so the frontend can use
    # relative URLs (/api, /images) and it works from localhost OR any LAN IP
    # without rebuilding. No CORS needed.

    # REST API
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded images / static files served from the API's wwwroot
    location /images/ {
        proxy_pass http://api:8080/images/;
        proxy_set_header Host $host;
    }

    # SignalR notification hub (WebSocket)
    location /hubs/ {
        proxy_pass http://api:8080/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ---- Hashed build assets: cache forever, but 404 if truly missing ----
    # Without the =404 here, a request for an old/renamed bundle would fall
    # through to the SPA fallback and return index.html (text/html) in place
    # of JavaScript. The browser then tries to execute HTML as JS and the
    # whole app dies with a blank white screen. 404 fails cleanly instead.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- SPA fallback so React Router deep-links work on refresh ----
    # The HTML shell must NEVER be cached, otherwise a phone keeps loading an
    # old index.html that points at bundle hashes which no longer exist after
    # a redeploy -> white screen. Assets are content-hashed so this is safe.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }
}
